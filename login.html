<body>

<div id="auth-screen-layer" class="app-screen-layer active-layer">

    <div class="auth-card">

        <!-- Logo -->
        <div class="brand-header">

            <img src="logo.png" class="logo" alt="BankBugs">

            <h1>BANK<span class="brand-highlight">BUGS</span></h1>

            <p class="tagline">
                Sign in to continue
            </p>

        </div>

        <!-- Login -->

        <form id="auth-login-form">

            <input
                type="text"
                id="login-email"
                placeholder="Email or Username"
                required>

            <input
                type="password"
                id="login-password"
                placeholder="Password"
                required>

            <button
                type="submit"
                class="auth-btn login-btn">

                Log In

            </button>

        </form>

        <button
            id="btn-free-beginner"
            class="auth-btn free-btn">

            Continue as Free Beginner

        </button>

    </div>

</div>

<script src="js/app.js"></script>

</body>
