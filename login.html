<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>bankbugs|FX | Professional Trading Ecosystem</title>
    <meta name="theme-color" content="#0a0e17">
    <meta name="description" content="bankbugs|FX - Certified Premium Trading Ecosystem and Market Analysis">
    
    <style>
        /* --- Premium Influencer Dark Theme UI --- */
        :root {
            --bg-main: #0a0e17;
            --bg-card: #121824;
            --bg-input: #1a2234;
            --primary: #00ff88; /* Neon Emerald Green */
            --primary-hover: #00e077;
            --accent: #ffd700; /* Gold for Certificates/Achievements */
            --text-main: #ffffff;
            --text-muted: #8fa0dd;
            --border-color: #222e47;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Brand Header (Top Left) --- */
        .top-nav {
            padding: 20px 4%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            background: linear-gradient(to bottom, rgba(10,14,23,1), rgba(10,14,23,0.8));
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-transform: lowercase;
        }

        .brand-logo span {
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 900;
            border-left: 2px solid var(--border-color);
            margin-left: 4px;
            padding-left: 6px;
        }

        /* --- Live TradingView Ticker Container --- */
        .ticker-wrap {
            width: 100%;
            background: #000000;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            height: 40px;
            overflow: hidden;
        }

        /* --- Split Layout Hero Section --- */
        .hero-container {
            max-width: 1200px;
            width: 100%;
            margin: 40px auto;
            padding: 0 4%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: center;
        }

        @media (max-width: 900px) {
            .hero-container {
                grid-template-columns: 1fr;
                margin: 20px auto;
                gap: 30px;
            }
        }

        /* --- Welcome / Value Proposition Message --- */
        .welcome-message h2 {
            font-size: 2.8rem;
            line-height: 1.2;
            margin-bottom: 15px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-message p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .value-bullets {
            list-style: none;
        }

        .value-bullets li {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1rem;
            color: #cbd5e1;
        }

        .value-bullets li::before {
            content: "✓";
            color: var(--primary);
            font-weight: bold;
            margin-right: 12px;
            font-size: 1.1rem;
        }

        /* --- High-Conversion 3-Button Login Box --- */
        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .form-heading {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .auth-card input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.15);
        }

        /* Vertical Stack Action Buttons */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }

        .btn-action {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        /* Button 1: Main Login Form Action */
        .login-submit-btn {
            background-color: var(--primary);
            color: #020617;
        }

        .login-submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Button 2: Competition Redirect Hook */
        .competition-btn {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: #000000;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .competition-btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        /* Button 3: Continue as Visitor Bypass */
        .visitor-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .visitor-btn:hover {
            background-color: rgba(255,255,255,0.03);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* --- About Me Influencer Bio Section --- */
        .about-section {
            background-color: #0e1420;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 60px 4%;
        }

        .about-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 60px;
            align-items: center;
        }

        @media (max-width: 900px) {
            .about-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }

        .bio-text h3 {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
            color: #ffffff;
        }

        .bio-text p {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 1.05rem;
            margin-bottom: 15px;
        }

        /* --- 5-Slide Visual Carousel Container --- */
        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            aspect-ratio: 16 / 10;
        }

        .carousel-track {
            display: flex;
            width: 500%; /* 5 Slides */
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .carousel-slide {
            width: 20%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            position: relative;
            background: linear-gradient(145deg, #121824 0%, #0a0e17 100%);
        }

        /* Visual representations for missing asset paths */
        .slide-badge {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .slide-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .slide-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 80%;
        }

        /* Carousel Navigation Micro-indicators */
        .carousel-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: var(--primary);
            width: 20px;
            border-radius: 4px;
        }

        /* --- Compliance Footer Section --- */
    <footer class="footer-disclaimer">
        <p><strong>RISK WARNING & FINANCIAL DISCLAIMER:</strong> Trading foreign exchange (Forex), commodity futures, crypto assets, and contracts for difference (CFDs) carries highly significant risks of loss and may not be appropriate for all retail profiles. The high degree of leverage generated can operate aggressively against you as well as for you. Past achievements or certificates listed within bankbugs|FX are not indicative of future performance capabilities. Information provided here does not represent explicit asset buy/sell mandates or tailored advisory packages. You must carefully assess your liquid capacity before attempting execution actions.</p>
    </footer>

    <script>
        // Automatic Sliding System for Achievements Carousel
        let currentSlide = 0;
        const track = document.getElementById('carouselTrack');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = 5;

        function updateCarouselView() {
            track.style.transform = `translateX(-${currentSlide * 20}%)`;
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        function jumpToSlide(index) {
            currentSlide = index;
            updateCarouselView();
        }

        // Auto transition every 4 seconds
        setInterval(() => {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateCarouselView();
        }, 4000);

        // Service Worker registration script backup from core file
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => console.log('Service Worker Active:', reg.scope))
                    .catch((err) => console.error('Service Worker Error:', err));
            });
        }
    </script>
</body>
</html>
