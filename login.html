
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>TheBankBugs | Login</title>

    <link rel="stylesheet" href="css/style.css">

    <meta name="theme-color" content="#000000">
    <meta name="description" content="TheBankBugs Trading Ecosystem">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="auth-screen-layer" class="app-screen-layer active-layer static-auth-position">

    <div class="auth-card">

        <!-- BRAND -->
        <div class="brand-header">
            <h1>THE<span class="brand-highlight">BANKBUGS</span></h1>
            <p class="tagline">Sign in to continue</p>
        </div>

        <!-- LOGIN FORM -->
        <form id="auth-login-form">

            <input
                type="text"
                id="login-email"
                placeholder="Email or Username"
                required>

            <input
                type="password"
                id="login-password"
                placeholder="Password"
                required>

            <button
                type="submit"
                class="auth-btn login-btn">
                Log In
            </button>

        </form>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <!-- FREE BEGINNER -->
        <button
            id="btn-free-beginner"
            class="auth-btn free-btn">
            Continue as Free Beginner
        </button>

    </div>

</div>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker active:', reg.scope))
            .catch((err) => console.error('Service Worker failed:', err));
    });
}
</script>

<script src="js/app.js"></script>

</body>
</html>
