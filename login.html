```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TheBankBugs | Login</title>

<link rel="stylesheet" href="css/style.css">

<meta name="theme-color" content="#ffffff">
<meta name="description" content="TheBankBugs Trading Ecosystem">

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <img src="images/logo.png" class="logo" alt="BankBugs Logo">

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Sign in to continue your trading journey.
        </p>

        <form id="auth-login-form">

            <label>Email or Username</label>

            <input
                type="text"
                id="login-email"
                placeholder="Enter your email"
                required
            >

            <label>Password</label>

            <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                required
            >

            <a href="#" class="forgot">
                Forgot Password?
            </a>

            <button
                type="submit"
                class="login-btn">
                Secure Login
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button
            id="btn-free-beginner"
            class="beginner-btn">

            Continue as Beginner

        </button>

        <div class="features">

            <div class="feature">
                ✓ Beginner Friendly
            </div>

            <div class="feature">
                ✓ MT5 Integration
            </div>

            <div class="feature">
                ✓ Elite Learning
            </div>

            <div class="feature">
                ✓ Risk Management
            </div>

        </div>

        <div class="footer">

            <strong>BANKBUGS</strong>

            <p>
                PNG's Premier Digital Trading Ecosystem
            </p>

            <small>
                Developed by Otto Eric
            </small>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
