<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TheBankBugs | Login Terminal</title>
    <link rel="stylesheet" href="css/style.css">    
    <style>
        /* ────────── BULLETPROOF LIVE MARKET TICKER PANEL ────────── */
        .market-ticker-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 520px;
            height: 46px; /* Forces explicit height calculation */
            overflow: hidden;
            background: rgba(22, 26, 30, 0.6) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-dim-gray);
            border-radius: 30px;
            z-index: 100;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        /* Forces the web component to render explicitly inside absolute parents */
        .market-ticker-wrapper tv-ticker-tape {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }
    </style>
    <!-- Official Web Component Loader Module -->
    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
</head>
<body>

    <!-- ========================================================== -->
    <!-- LIVE VIDEO BACKGROUND SYSTEM LAYER                          -->
    <!-- ========================================================== -->
    <div class="video-bg-container">
        <video autoplay loop muted playsinline class="video-bg-media">
            <source src="https://mixkit.co" type="video/mp4">
        </video>
        <div class="video-bg-overlay"></div>
    </div>

    <!-- ========================================================== -->
    <!-- NATIVE BULLETPROOF TRADINGVIEW TICKER LAYER                -->
    <!-- ========================================================== -->
    <div class="market-ticker-wrapper">
        <tv-ticker-tape
            symbols="FX_IDC:EURUSD|EURUSD,FX_IDC:GBPUSD|GBPUSD,FX_IDC:AUDUSD|AUDUSD,FX:XAUUSD|XAUUSD,GLOBALPRIME:US500|US500,GLOBALPRIME:US100|US100,GLOBALPRIME:DJI|US30"
            color-theme="dark"
            is-transparent="true"
            display-mode="adaptive"
            locale="en">
        </tv-ticker-tape>
    </div>

    <!-- ========================================================== -->
    <!-- GATEWAY AUTHENTICATION FRAME OVERLAY                       -->
    <!-- ========================================================== -->
    <div id="auth-screen-layer" class="app-screen-layer active-layer static-auth-position">
        <div class="auth-card">
            <h2>Welcome to TheBankBugs</h2>
            <p>I'm New Here</p>
            <button id="btn-free-beginner" class="auth-btn free-btn">Use FREE Resources</button>
            
            <div class="auth-divider">I'm a trader@thebankbugs</div>
            
            <form id="auth-login-form">
                <input type="text" id="login-email" placeholder="Email / Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="auth-btn login-btn">Log in</button>
            </form>

            <!-- Sponsor Attribution Panel -->
            <p style="font-size: 0.75rem; color: var(--text-muted-gray); line-height: 1.4; margin-top: 24px; border-top: 1px dashed var(--border-dim-gray); padding-top: 16px; letter-spacing: 0.3px;">
                This app is developed by trader <strong>Otto Eric</strong>.<br>
                Sponsored by <strong>IC Markets</strong>. Built for traders.
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
