<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TheBankBugs | Login Terminal</title>
    <link rel="stylesheet" href="css/style.css">    
    <style>
        /* ────────── HIGH-VOLTAGE NEON HOVER GLOW INTERFACES ────────── */
        
        /* 💡 Permanently Outlines the Login Box with Neon Green */
        #auth-screen-layer .auth-card {
            border: 1px solid #00ff00 !important;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.15), 0 12px 40px rgba(0,0,0,0.8) !important;
        }

        /* 1. Neon Box Glows on Input Fields (Email & Password) */
        #auth-login-form input {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #auth-login-form input:hover, #auth-login-form input:focus {
            border-color: #00ff00 !important;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4), inset 0 0 5px rgba(0, 255, 0, 0.2);
            background-color: rgba(0, 255, 0, 0.02) !important;
        }

        /* 2. Neon Ring Hover Glow on the "Use FREE Resources" Button */
        .free-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .free-btn:hover {
            background-color: rgba(0, 255, 0, 0.08) !important;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5), inset 0 0 10px rgba(0, 255, 0, 0.3);
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.6);
        }

        /* 3. Solid High-Intensity Neon Blast on the "Log in" Action Button */
        .login-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .login-btn:hover {
            background-color: #00ff00 !important;
            color: #000000 !important;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8), 0 0 10px rgba(0, 255, 0, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- ========================================================== -->
    <!-- LIVE VIDEO BACKGROUND SYSTEM LAYER                          -->
    <!-- ========================================================== -->
    <div class="video-bg-container">
        <!-- REPLACE THE SRC LINK BELOW WITH YOUR MP4 TRADING BACKGROUND LOOP -->
        <video autoplay loop muted playsinline class="video-bg-media">
            <source src="https://mixkit.co" type="video/mp4">
        </video>
        <div class="video-bg-overlay"></div>
    </div>

    <!-- ========================================================== -->
    <!-- GATEWAY AUTHENTICATION FRAME OVERLAY                       -->
    <!-- ========================================================== -->
    <div id="auth-screen-layer" class="app-screen-layer active-layer static-auth-position">
        <div class="auth-card">
            <h2>Welcome to TheBankBugs</h2>
            <p>I'm New Here</p>
            <button id="btn-free-beginner" class="auth-btn free-btn">Use FREE Resources</button>
            
            <div class="auth-divider">I'm a trader@thebankbugs</div>
            
            <form id="auth-login-form">
                <input type="text" id="login-email" placeholder="Email / Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="auth-btn login-btn">Log in</button>
            </form>

            <!-- 🛠️ SPONSOR & DEVELOPER FOOTER ATTRIBUTION -->
            <p style="font-size: 0.75rem; color: var(--text-muted-gray); line-height: 1.4; margin-top: 24px; border-top: 1px dashed var(--border-dim-gray); padding-top: 16px; letter-spacing: 0.3px;">
                This app is developed by trader <strong>Otto Eric</strong>.<br>
                Sponsored by <strong>IC Markets</strong>. Built for traders.
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
