<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TheBankBugs | Login Terminal</title>
    <!-- Master layout pathway stylesheet configuration link -->
    <link rel="stylesheet" href="css/style.css">    
    <style>
        /* ────────── STRUCTURAL DESKTOP COMPATIBLE IFRAME TICKER ────────── */
        .raw-ticker-container {
            width: 100%;
            height: 46px;
            background: #131722; /* High contrast default dark tracking bar solid layout color */
            border-bottom: 1px solid #2a2e39;
            overflow: hidden;
        }
        .raw-ticker-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <!-- ========================================================== -->
    <!-- DIRECT RAW IFRAME MARKET FEED (BULLETPROOF LOCAL PREVIEW)  -->
    <!-- ========================================================== -->
    <div class="raw-ticker-container">
        <!-- Direct server query string loading verified institutional ticker arrays -->
        <iframe src="https://tradingview.com" scrolling="no" allowtransparency="true"></iframe>
    </div>

    <!-- ========================================================== -->
    <!-- LIVE VIDEO BACKGROUND SYSTEM LAYER                          -->
    <!-- ========================================================== -->
    <div class="video-bg-container">
        <!-- REPLACE THE SRC LINK BELOW WITH YOUR MP4 TRADING BACKGROUND LOOP -->
        <video autoplay loop muted playsinline class="video-bg-media">
            <source src="https://mixkit.co" type="video/mp4">
        </video>
        <div class="video-bg-overlay"></div>
    </div>

    <!-- ========================================================== -->
    <!-- GATEWAY AUTHENTICATION FRAME OVERLAY                       -->
    <!-- ========================================================== -->
    <div id="auth-screen-layer" class="app-screen-layer active-layer static-auth-position">
        <div class="auth-card">
            <h2>Welcome to TheBankBugs</h2>
            <p>I'm New Here</p>
            <button id="btn-free-beginner" class="auth-btn free-btn">Use FREE Resources</button>
            
            <div class="auth-divider">I'm a trader@thebankbugs</div>
            
            <form id="auth-login-form">
                <input type="text" id="login-email" placeholder="Email / Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="auth-btn login-btn">Log in</button>
            </form>

            <!-- Sponsor Attribution Panel -->
            <p style="font-size: 0.75rem; color: var(--text-muted-gray); line-height: 1.4; margin-top: 24px; border-top: 1px dashed var(--border-dim-gray); padding-top: 16px; letter-spacing: 0.3px;">
                This app is developed by trader <strong>Otto Eric</strong>.<br>
                Sponsored by <strong>IC Markets</strong>. Built for traders.
            </p>
        </div>
    </div>

    <!-- Main core application routing framework script linking element -->
    <script src="js/app.js"></script>
</body>
</html>
